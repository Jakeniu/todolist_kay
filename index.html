<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外贸发货跟进任务系统</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f8;
    margin:0;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
}

h1{text-align:center;}

.row{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input,button{padding:8px;}

#taskName{flex:1;}

button{
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.add{background:#28a745;color:#fff;}

/* 统计 */
.stats{
    background:#eef2f7;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

/* 看板 */
.board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.col{
    background:#f8f9fa;
    border-radius:10px;
    padding:10px;
    min-height:300px;
}

.task{
    background:#fff;
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-bottom:8px;
    cursor:grab;
}

.name{
    font-weight:bold;
}

/* ⏳ 倒计时颜色区分 */
.timer{
    font-family:monospace;
    font-size:13px;
    padding:4px 8px;
    border-radius:6px;
    display:inline-block;
    margin-top:5px;
}

/* 🔵 2天以上 */
.blue{
    background:#dbe9ff;
    color:#1e5eff;
}

/* 🟡 1-2天 */
.yellow{
    background:#fff3cd;
    color:#8a6d00;
}

/* 🔴 少于1天 */
.red{
    background:#ffd6d6;
    color:#c40000;
}

.btns{
    display:flex;
    gap:5px;
    margin-top:5px;
}

.edit{background:#ff9800;color:#fff;}
.del{background:#dc3545;color:#fff;}
</style>
</head>

<body>

<div class="container">

<h1>📊 外贸发货跟单系统-Kay</h1>

<!-- 📊 状态统计 -->
<div class="stats">
待办：<span id="todoCount">0</span> |
进行中：<span id="doingCount">0</span> |
已完成：<span id="doneCount">0</span>
</div>

<!-- 新增任务 -->
<div class="row">
    <input id="taskName" placeholder="任务名称">
    <input type="datetime-local" id="deadline">
    <button class="add" onclick="addTask()">新增任务</button>
</div>

<!-- 看板 -->
<div class="board">
    <div class="col" id="todo" ondrop="drop(event,'todo')" ondragover="allow(event)">
        <h3>待办</h3>
    </div>

    <div class="col" id="doing" ondrop="drop(event,'doing')" ondragover="allow(event)">
        <h3>进行中</h3>
    </div>

    <div class="col" id="done" ondrop="drop(event,'done')" ondragover="allow(event)">
        <h3>已完成</h3>
    </div>
</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks_v7") || "[]");

/* 🔔 已提醒记录（防重复弹窗） */
let notified = JSON.parse(localStorage.getItem("notified_v7") || "{}");

function save(){
    localStorage.setItem("tasks_v7", JSON.stringify(tasks));
    localStorage.setItem("notified_v7", JSON.stringify(notified));
}

/* 新增 */
function addTask(){
    const name = document.getElementById("taskName").value.trim();
    const deadline = document.getElementById("deadline").value;

    if(!name) return alert("请输入任务");
    if(!deadline) return alert("请选择时间");

    tasks.push({
        id: Date.now(),
        name,
        endTime: new Date(deadline).getTime(),
        status: "todo"
    });

    document.getElementById("taskName").value="";
    save();
    render();
}

/* 删除 */
function del(id){
    tasks = tasks.filter(t=>t.id!==id);
    delete notified[id];
    save();
    render();
}

/* 修改 */
function edit(id){
    const t = tasks.find(x => x.id === id);
    if(!t) return;

    // 当前时间转 datetime-local 格式
    const dt = new Date(t.endTime);
    const local = new Date(dt.getTime() - dt.getTimezoneOffset()*60000)
        .toISOString().slice(0,16);

    // 创建遮罩弹窗（不破坏UI）
    const mask = document.createElement("div");
    mask.style.position = "fixed";
    mask.style.top = "0";
    mask.style.left = "0";
    mask.style.width = "100%";
    mask.style.height = "100%";
    mask.style.background = "rgba(0,0,0,0.4)";
    mask.style.display = "flex";
    mask.style.alignItems = "center";
    mask.style.justifyContent = "center";
    mask.style.zIndex = "9999";

    mask.innerHTML = `
        <div style="
            background:#fff;
            padding:20px;
            border-radius:10px;
            width:320px;
        ">
            <h3 style="margin-top:0;">修改任务</h3>

            <input id="editName" style="width:100%;padding:8px;margin-bottom:10px;"
                value="${t.name}">

            <input id="editTime" type="datetime-local"
                style="width:100%;padding:8px;margin-bottom:10px;"
                value="${local}">

            <div style="display:flex;justify-content:flex-end;gap:10px;">
                <button id="cancelBtn">取消</button>
                <button id="saveBtn" style="background:#28a745;color:#fff;">保存</button>
            </div>
        </div>
    `;

    document.body.appendChild(mask);

    // 取消
    mask.querySelector("#cancelBtn").onclick = () => {
        document.body.removeChild(mask);
    };

    // 保存
    mask.querySelector("#saveBtn").onclick = () => {

        const newName = mask.querySelector("#editName").value.trim();
        const newTime = mask.querySelector("#editTime").value;

        if(!newName || !newTime){
            alert("任务名和时间不能为空");
            return;
        }

        t.name = newName;
        t.endTime = new Date(newTime).getTime();

        save();
        render(); // 或 renderAll()
        document.body.removeChild(mask);
    };
}

/* 状态 */
function setStatus(id,status){
    const t = tasks.find(x=>x.id===id);
    if(!t) return;
    t.status = status;

    if(status === "done"){
        delete notified[id];
    }

    save();
    render();
}

/* 拖拽 */
function allow(e){ e.preventDefault(); }

function drag(e){
    e.dataTransfer.setData("id", e.target.dataset.id);
}

function drop(e,status){
    const id = e.dataTransfer.getData("id");
    setStatus(Number(id), status);
}

/* ⏳ 时间格式 */
function format(ms){
    if(ms<=0) return "已结束";

    let s=Math.floor(ms/1000);
    const d=Math.floor(s/86400); s%=86400;
    const h=Math.floor(s/3600); s%=3600;
    const m=Math.floor(s/60);
    const sec=s%60;

    return (d?d+"天":"")+(h?h+"小时":"")+(m?m+"分":"")+sec+"秒";
}

/* 🎨 颜色 */
function getColor(ms){
    const day = ms / 86400000;
    if(day < 1) return "red";
    if(day <= 2) return "yellow";
    return "blue";
}

/* 📊 统计 */
function updateStats(){
    document.getElementById("todoCount").innerText =
        tasks.filter(t=>t.status==="todo").length;

    document.getElementById("doingCount").innerText =
        tasks.filter(t=>t.status==="doing").length;

    document.getElementById("doneCount").innerText =
        tasks.filter(t=>t.status==="done").length;
}

/* 🔔 到期提醒核心逻辑 */
function checkReminder(){

    const now = Date.now();

    tasks.forEach(t=>{

        if(t.status === "done") return;

        const remain = t.endTime - now;

        /* 已到期 & 未提醒 */
        if(remain <= 0 && !notified[t.id]){

            alert("⏰ 任务到期：" + t.name);

            notified[t.id] = true;
        }
    });

    save();
}

/* 渲染 */
function render(){

    ["todo","doing","done"].forEach(id=>{
        const col=document.getElementById(id);
        col.innerHTML=`<h3>${col.querySelector("h3")?.innerText || ""}</h3>`;
    });

    const now = Date.now();

    tasks.forEach(t=>{

        const remain = t.endTime - now;

        const div = document.createElement("div");
        div.className="task";
        div.dataset.id=t.id;
        div.draggable=true;
        div.ondragstart=drag;

        div.innerHTML=`
            <div class="name">${t.name}</div>

            <div class="timer ${getColor(remain)}">
                ${format(remain)}
            </div>

            <div class="btns">
                <button class="edit">修改</button>
                <button class="del">删除</button>
            </div>
        `;

        div.querySelector(".edit").onclick=()=>edit(t.id);
        div.querySelector(".del").onclick=()=>del(t.id);

        document.getElementById(t.status).appendChild(div);
    });

    updateStats();
    save();
}

/* 🚀 每秒刷新 + 检查提醒 */
setInterval(()=>{
    render();
    checkReminder();
},1000);

render();


</script>

</body>
</html>
