<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Task V8.1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>📊 Task V8.1 Pro</h1>

<input id="search" placeholder="搜索任务...">

<div class="row">
    <input id="taskName" placeholder="任务名称">
    <input type="datetime-local" id="deadline">
    <button onclick="App.addTask()">新增</button>
</div>

<div class="board">
    <div class="col" id="todo" ondrop="UI.drop(event,'todo')" ondragover="UI.allow(event)">
        <h3>待办</h3>
    </div>

    <div class="col" id="doing" ondrop="UI.drop(event,'doing')" ondragover="UI.allow(event)">
        <h3>进行中</h3>
    </div>

    <div class="col" id="done" ondrop="UI.drop(event,'done')" ondragover="UI.allow(event)">
        <h3>已完成</h3>
    </div>
</div>

</div>

<script src="db.js"></script>
<script src="storage.js"></script>
<script src="image.js"></script>
<script src="reminder.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
